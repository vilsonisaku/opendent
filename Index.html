<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DentalPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── LOGIN ─────────────────────────────────────────────────────── -->
  <div id="login-overlay" style="display:flex">
    <div id="login-box">
      <div class="login-logo">
        <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="9" fill="#0f2942"/>
          <path d="M20 6C13.373 6 8 11.373 8 18c0 4.2 2.1 7.92 5.28 10.2L14 32h12l.72-3.8C29.9 25.92 32 22.2 32 18c0-6.627-5.373-12-12-12z" fill="#38bdf8"/>
          <circle cx="20" cy="18" r="4" fill="#0f2942"/>
        </svg>
        <div>
          <div class="login-brand">DentalPro</div>
          <div class="login-brand-sub">Practice Management</div>
        </div>
      </div>
      <div class="login-form-title">Welcome back</div>
      <div class="login-form-sub">Sign in to access your practice</div>
      <div id="client-mode-badge" style="display:none;margin-bottom:12px;padding:8px 12px;border-radius:8px;font-size:12px;background:rgba(14,165,233,.12);border:1px solid rgba(14,165,233,.3);color:#38bdf8;word-break:break-all;text-align:center;line-height:1.6"></div>
      <form id="login-form">
        <div class="lform-group">
          <label class="lform-label" for="login-username">Username</label>
          <input class="lform-input" id="login-username" autocomplete="username" placeholder="Enter username" />
        </div>
        <div class="lform-group">
          <label class="lform-label" for="login-password">Password</label>
          <div class="lform-password-wrap">
            <input class="lform-input" id="login-password" type="password" autocomplete="current-password" placeholder="Enter password" />
            <button type="button" class="pw-toggle" onclick="togglePassword()" tabindex="-1">
              <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="login-btn">Sign In</button>
        <p id="login-error" class="login-error"></p>
        <div class="login-divider"><span>Quick access</span></div>
        <div class="login-quick">
          <button type="button" class="quick-btn" onclick="quickLogin('admin','password123')">Admin</button>
          <button type="button" class="quick-btn" onclick="quickLogin('drjohnson','password123')">Dr. Johnson</button>
          <button type="button" class="quick-btn" onclick="quickLogin('drwilliams','password123')">Dr. Williams</button>
          <button type="button" class="quick-btn" onclick="quickLogin('sarah','password123')">Sarah H.</button>
        </div>
        <p class="login-hint">Default password: <code>password123</code></p>
      </form>
    </div>
  </div>

  <!-- ── APP SHELL ──────────────────────────────────────────────────── -->
  <div id="app" style="display:none">
    <aside id="sidebar">
      <div class="sidebar-brand">
        <svg width="30" height="30" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="9" fill="#0f2942"/>
          <path d="M20 6C13.373 6 8 11.373 8 18c0 4.2 2.1 7.92 5.28 10.2L14 32h12l.72-3.8C29.9 25.92 32 22.2 32 18c0-6.627-5.373-12-12-12z" fill="#38bdf8"/>
          <circle cx="20" cy="18" r="4" fill="#0f2942"/>
        </svg>
        <div class="brand-text">
          <div class="brand-name">DentalPro</div>
          <div class="brand-version">v2.4</div>
        </div>
      </div>

      <div class="nav-section-label">Main</div>
      <nav>
        <button class="nav-btn active" data-view="dashboard">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="6" height="6" rx="1"/><rect x="11" y="3" width="6" height="6" rx="1"/><rect x="3" y="11" width="6" height="6" rx="1"/><rect x="11" y="11" width="6" height="6" rx="1"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-btn" data-view="patients">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="6" r="3"/><path d="M2 17c0-3.314 2.686-6 6-6"/><circle cx="15" cy="9" r="2.5"/><path d="M11 17c0-2.209 1.791-4 4-4h0c2.209 0 4 1.791 4 4"/></svg>
          <span>Patients</span>
          <span class="nav-count" id="nc-patients">—</span>
        </button>
        <button class="nav-btn" data-view="appointments">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="14" height="13" rx="2"/><path d="M7 2v3M13 2v3M3 8h14"/></svg>
          <span>Schedule</span>
          <span class="nav-count accent" id="nc-appts">—</span>
        </button>
        <button class="nav-btn" data-view="billing">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="5" width="16" height="11" rx="2"/><path d="M2 9h16M6 13h3"/></svg>
          <span>Billing</span>
          <span class="nav-count warn" id="nc-billing">—</span>
        </button>
        <button class="nav-btn" data-view="doctors">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M10 2a4 4 0 100 8 4 4 0 000-8z"/><path d="M3 18a7 7 0 0114 0"/><path d="M13 11v4m-2-2h4"/></svg>
          <span>Doctors</span>
          <span class="nav-count" id="nc-doctors">—</span>
        </button>
        <button class="nav-btn" data-view="users" id="nav-users" style="display:none">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="7" cy="6" r="3"/><path d="M1 17c0-3 2.686-5 6-5"/><circle cx="14" cy="8" r="2.5"/><path d="M11 17c0-2.5 1.343-4 3-4s3 1.5 3 4"/><path d="M17 5v4m-2-2h4"/></svg>
          <span>Users</span>
          <span class="nav-count" id="nc-users">—</span>
        </button>
      </nav>

      <div class="nav-section-label" style="margin-top:auto">Account</div>
      <div id="connection-status" style="display:none;padding:6px 14px;margin-bottom:4px">
        <div id="conn-badge" style="font-size:11px;border-radius:6px;padding:4px 10px;text-align:center"></div>
      </div>
      <button id="btn-reconfigure" style="display:none;margin:0 10px 4px;padding:7px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:rgba(255,255,255,.5);font-size:11px;cursor:pointer;text-align:left;width:calc(100% - 20px)" onclick="showEditServerModal()">
        🌐 Edit Server Address
      </button>
      <button id="btn-reconfigure-full" style="display:none;margin:0 10px 6px;padding:7px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:rgba(255,255,255,.5);font-size:11px;cursor:pointer;text-align:left;width:calc(100% - 20px)" onclick="reconfigure()">
        ⚙️ Switch Server/Client Mode
      </button>
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebar-avatar">DS</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-name">Dr. Smith</div>
          <div class="user-role" id="sidebar-role">Administrator</div>
        </div>
        <button class="logout-btn" onclick="logout()" title="Sign out">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 10H3m0 0l3-3m-3 3l3 3"/><path d="M7 6V4a1 1 0 011-1h8a1 1 0 011 1v12a1 1 0 01-1 1H8a1 1 0 01-1-1v-2"/></svg>
        </button>
      </div>
    </aside>

    <main id="main-content">
      <div id="view-dashboard" class="view active"></div>
      <div id="view-patients" class="view"></div>
      <div id="view-appointments" class="view"></div>
      <div id="view-billing" class="view"></div>
      <div id="view-doctors" class="view"></div>
      <div id="view-users" class="view"></div>
    </main>
  </div>

  <!-- ── MODAL ──────────────────────────────────────────────────────── -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <div id="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 5l10 10M15 5L5 15"/></svg>
        </button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- ── TOAST ──────────────────────────────────────────────────────── -->
  <div id="toast"></div>

  <!-- ── CTX MENU BACKDROP ──────────────────────────────────────────── -->
  <div id="ctx-backdrop"></div>

  <!-- Client-api must load before app.js. In client mode preload injects __clientConfig -->
  <script src="client-api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const badge = document.getElementById('client-mode-badge');
      if (!badge) return;
      // Only show badge in client mode
      if (typeof window.__clientConfig === 'undefined') return;
      const url = window.__clientConfig.serverUrl || 'NOT SET';
      badge.style.display = 'block';
      badge.innerHTML = '🌐 Connecting to <strong>' + url + '</strong>...';
      fetch(url + '/health')
        .then(r => r.json())
        .then(() => {
          badge.style.background = 'rgba(34,197,94,.12)';
          badge.style.borderColor = 'rgba(34,197,94,.3)';
          badge.style.color = '#4ade80';
          badge.innerHTML = '🟢 Connected · <strong>' + url + '</strong>';
        })
        .catch(e => {
          badge.style.background = 'rgba(239,68,68,.12)';
          badge.style.borderColor = 'rgba(239,68,68,.3)';
          badge.style.color = '#f87171';
          badge.innerHTML = '🔴 Cannot reach server<br><strong>' + url + '</strong><br><small>' + e.message + '</small>';
        });
    });
  </script>
  <script src="app.js"></script>
</body>
</html>
